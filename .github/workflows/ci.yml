name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: randomcams
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/randomcams
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-not-for-production
      ADMIN_TOKEN: ci-test-admin-secret
      GOOGLE_CLIENT_ID: ''
      CLIENT_ORIGIN: http://localhost:5173
      KYC_PROVIDER: mock

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        working-directory: packages/server
        run: npx prisma generate

      - name: Apply database migrations
        working-directory: packages/server
        run: npx prisma migrate deploy

      - name: Build all packages
        run: npm run build

      - name: Typecheck server tests
        working-directory: packages/server
        run: npm run typecheck

      - name: Run server test suite
        working-directory: packages/server
        run: npm test
