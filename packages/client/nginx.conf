server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: main.tsx does its own pathname-based routing for
    # /admin, /terms, /privacy, /reset-password, /verify-email - all of
    # them need to resolve to index.html on a direct load/refresh, not 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
