# Example edge reverse proxy: terminates TLS and routes a single public
# domain to the client (static SPA) and server (API + Socket.IO) containers.
# Adjust upstream hostnames to match your docker-compose service names.
#
# Requires real certs (e.g. via certbot/Let's Encrypt) mounted at the paths
# below - this file assumes they already exist, it doesn't provision them.

upstream randomcams_client {
    server client:80;
}

upstream randomcams_server {
    server server:4000;
}

server {
    listen 80;
    server_name example.com www.example.com;
    # Redirect everything to HTTPS except the ACME challenge path certbot uses.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name example.com www.example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # Socket.IO needs the Upgrade/Connection headers forwarded and a long
    # read timeout - the default proxy_read_timeout will kill idle
    # long-polling/websocket connections otherwise.
    location /socket.io/ {
        proxy_pass http://randomcams_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location ~ ^/(auth|verification|admin|health)(/|$) {
        proxy_pass http://randomcams_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://randomcams_client;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
